name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: GeiserX/awesome-lint-extra@v1.1.0
        with:
          require_badges: 'true'
          badge_types: '["stars", "last-commit", "language", "license"]'
          check_alphabetical: 'true'
  links:
    runs-on: [self-hosted, Linux, X64]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --insecure --accept 200..=403 --exclude img.shields.io --exclude larioja.org --exclude lariojaturismo.com README.md
          fail: true
