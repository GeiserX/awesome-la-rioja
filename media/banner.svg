<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <!-- La Rioja: Red (#CC0000), White (#FFFFFF), Green (#00703C) -->
  <defs>
    <clipPath id="r"><rect width="800" height="200" rx="16"/></clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/><stop offset="100%" stop-color="#14141f"/>
    </linearGradient>
    <filter id="b1"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <g clip-path="url(#r)">
    <rect width="800" height="200" fill="url(#bg)"/>
    <ellipse cx="150" cy="180" rx="200" ry="120" fill="#CC0000" opacity="0.15" filter="url(#b1)"/>
    <ellipse cx="650" cy="20" rx="200" ry="120" fill="#00703C" opacity="0.1" filter="url(#b1)"/>
    <rect width="800" height="2" fill="#CC0000" opacity="0.6"/>
    <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" fill="#fff" font-weight="700" letter-spacing="1">awesome-la-rioja</text>
    <rect x="310" y="86" width="180" height="2" rx="1" fill="#CC0000" opacity="0.5"/>
    <text x="400" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="300" letter-spacing="3">SOFTWARE OPEN SOURCE PARA LA RIOJA</text>
    <!-- Grape cluster: stylized grape shapes representing La Rioja wine heritage -->
    <g fill="#00703C" opacity="0.4" transform="translate(400,158)">
      <circle cx="-12" cy="-4" r="4"/><circle cx="-4" cy="-4" r="4"/><circle cx="4" cy="-4" r="4"/><circle cx="12" cy="-4" r="4"/>
      <circle cx="-8" cy="4" r="4"/><circle cx="0" cy="4" r="4"/><circle cx="8" cy="4" r="4"/>
      <circle cx="-4" cy="12" r="4"/><circle cx="4" cy="12" r="4"/>
      <circle cx="0" cy="20" r="4"/>
      <rect x="-1" y="-14" width="2" height="8" rx="1" fill="#00703C" opacity="0.5"/>
      <ellipse cx="6" cy="-14" rx="5" ry="3" fill="#00703C" opacity="0.3" transform="rotate(-20,6,-14)"/>
    </g>
  </g>
</svg>
